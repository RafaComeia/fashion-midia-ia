recommendations:
  immediate: []
  future:
    - action: >
        Conectar packages/config/eslint nos apps e harmonizar regras entre web e api.
        Garantir que a config central seja a única fonte de verdade.
      refs:
        - packages/config/eslint/index.js
        - apps/web/eslint.config.mjs
        - apps/api/eslint.config.mjs
    - action: Corrigir flag --ext deprecada em apps/web e atualizar README versão Next.js.
      refs:
        - apps/web/package.json
        - README.md
    - action: Remover prettier duplicado de apps/api (usar root).
      refs:
        - apps/api/package.json
